name: Deploy WeChat Mini Program

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Install miniprogram-ci
        run: npm install --no-save miniprogram-ci

      - name: Build WeChat mini program
        run: npm run build:mp-weixin

      - name: Write private key
        run: |
          cat <<'EOF' > private.key
          ${{ secrets.WX_PRIVATE_KEY }}
          EOF

      - name: Upload with miniprogram-ci
        run: node deploy.js
        env:
          WX_APPID: ${{ secrets.WX_APPID }}

      - name: Cleanup private key
        if: always()
        run: rm -f private.key
